<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=5, user-scalable=yes">
<title>Menú</title>
<style>
  @font-face {
    font-family: 'Anton';
    src: local('Anton');
  }
  :root{
    --bg:#14100D;
    --surface:#1F1815;
    --surface-2:#2A211C;
    --ember:#E8622C;
    --verdugo-red:#C4362B;
    --text:#F5EFE6;
    --muted:#A89A8C;
    --grate: repeating-linear-gradient(90deg, rgba(232,98,44,.35) 0 2px, transparent 2px 18px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);
    font-family:'Work Sans', 'Segoe UI', sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body{padding-bottom:48px;}

  header.hero{
    padding:28px 20px 18px;
    position:relative;
    overflow:hidden;
    background:
      radial-gradient(120% 90% at 15% 0%, rgba(196,54,43,.35), transparent 60%),
      radial-gradient(120% 90% at 100% 0%, rgba(232,98,44,.25), transparent 55%),
      var(--bg);
    border-bottom:1px solid rgba(232,98,44,.25);
  }
  .eyebrow{
    font-size:11px; letter-spacing:.18em; text-transform:uppercase;
    color:var(--ember); font-weight:600; margin-bottom:6px;
  }
  h1{
    font-family:'Anton','Arial Narrow',sans-serif;
    font-weight:400;
    font-size:clamp(34px,10vw,52px);
    letter-spacing:.01em;
    margin:0 0 6px;
    line-height:.95;
    text-transform:uppercase;
  }
  h1 span{color:var(--ember);}
  .hero p{color:var(--muted); font-size:14px; margin:0; max-width:46ch;}

  nav.chips{
    position:sticky; top:0; z-index:20;
    display:flex; gap:8px; overflow-x:auto;
    padding:12px 16px; background:rgba(20,16,13,.92);
    backdrop-filter:blur(6px);
    border-bottom:1px solid rgba(232,98,44,.18);
    scrollbar-width:none;
  }
  nav.chips::-webkit-scrollbar{display:none;}
  nav.chips a{
    flex:0 0 auto;
    font-size:13px; font-weight:600;
    color:var(--muted);
    background:var(--surface);
    border:1px solid rgba(245,239,230,.08);
    padding:8px 14px; border-radius:999px;
    text-decoration:none; white-space:nowrap;
    transition:.15s;
  }
  nav.chips a.active, nav.chips a:active{
    color:var(--bg); background:var(--ember); border-color:var(--ember);
  }

  main{padding:8px 16px 0;}

  section.group{padding:34px 0 6px;}
  .group-head{
    display:flex; align-items:baseline; gap:10px; margin-bottom:14px;
  }
  .group-num{
    font-family:'Anton',sans-serif; color:var(--verdugo-red);
    font-size:15px; opacity:.8;
  }
  .group-title{
    font-family:'Anton',sans-serif; text-transform:uppercase;
    font-size:22px; letter-spacing:.01em;
  }
  .grate{height:3px; background:var(--grate); margin-bottom:18px; opacity:.8;}

  .grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:10px;
  }
  .card{
    position:relative; border-radius:14px; overflow:hidden;
    background:var(--surface); border:1px solid rgba(245,239,230,.06);
    aspect-ratio:1/1;
  }
  .card img{
    width:100%; height:100%; object-fit:cover; display:block;
    cursor:zoom-in;
  }
  .card .tap-hint{
    position:absolute; bottom:6px; right:8px;
    font-size:10px; color:#fff; background:rgba(0,0,0,.45);
    padding:3px 7px; border-radius:999px; letter-spacing:.03em;
    pointer-events:none;
  }

  footer{
    text-align:center; color:var(--muted); font-size:12px;
    padding:36px 20px 10px; letter-spacing:.02em;
  }
  footer b{color:var(--ember);}

  /* Lightbox */
  .lightbox{
    position:fixed; inset:0; background:rgba(10,8,6,.97);
    display:none; z-index:50;
    align-items:center; justify-content:center;
    flex-direction:column;
  }
  .lightbox.open{display:flex;}
  .lightbox .lb-scroll{
    width:100%; height:100%;
    overflow:auto;
    display:flex; align-items:center; justify-content:center;
    touch-action:pinch-zoom pan-x pan-y;
  }
  .lightbox img{
    max-width:94vw; max-height:82vh;
    width:auto; height:auto;
    border-radius:8px;
    margin:auto;
  }
  .lb-close{
    position:absolute; top:16px; right:16px;
    width:40px; height:40px; border-radius:50%;
    background:var(--surface-2); color:var(--text);
    border:1px solid rgba(245,239,230,.15);
    font-size:20px; line-height:1; display:flex; align-items:center; justify-content:center;
    z-index:2;
  }
  .lb-caption{
    position:absolute; bottom:18px; left:0; right:0;
    text-align:center; color:var(--muted); font-size:12px;
    letter-spacing:.03em;
  }
  .lb-nav{
    position:absolute; top:50%; transform:translateY(-50%);
    width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,.06); color:var(--text);
    border:1px solid rgba(245,239,230,.15);
    font-size:20px; display:flex; align-items:center; justify-content:center;
  }
  .lb-prev{left:10px;} .lb-next{right:10px;}
</style>
</head>
<body>

<header class="hero">
  <div class="eyebrow">Escanea · Mira · Pide</div>
  <h1>Men<span>ú</span> Digital</h1>
  <p>Toca cualquier foto para hacerle zoom y leer bien los precios. Desliza entre categorías arriba.</p>
</header>

<nav class="chips" id="chipNav"><!--CHIPS--></nav>

<main id="main"><!--SECTIONS--></main>

<footer>Hecho con <b>♦</b> para que no tengas que cargar el menú de papel.</footer>

<div class="lightbox" id="lightbox">
  <button class="lb-close" id="lbClose">✕</button>
  <button class="lb-nav lb-prev" id="lbPrev">‹</button>
  <button class="lb-nav lb-next" id="lbNext">›</button>
  <div class="lb-scroll">
    <img id="lbImg" src="" alt="">
  </div>
  <div class="lb-caption" id="lbCaption"></div>
</div>

const main = document.getElementById('main');
const chipNav = document.getElementById('chipNav');
let flatImages = [];

DATA.forEach((group, gi) => {
  chipNav.innerHTML += `<a href="#${group.id}" data-id="${group.id}">${group.label}</a>`;

  const section = document.createElement('section');
  section.className = 'group';
  section.id = group.id;
  section.innerHTML = `
    <div class="group-head">
      <span class="group-num">0${gi+1}</span>
      <span class="group-title">${group.label}</span>
    </div>
    <div class="grate"></div>
    <div class="grid">
      ${group.images.map((img) => `
        <div class="card">
          <img src="data:image/jpeg;base64,${img.b64}" loading="lazy" data-flat-index="${flatImages.length + group.images.indexOf(img)}" alt="${group.label}">
          <span class="tap-hint">🔍 zoom</span>
        </div>
      `).join('')}
    </div>
  `;
  main.appendChild(section);
  group.images.forEach(img => flatImages.push({ ...img, label: group.label }));
});

// Lightbox logic
const lightbox = document.getElementById('lightbox');
const lbImg = document.getElementById('lbImg');
const lbCaption = document.getElementById('lbCaption');
let currentIndex = 0;

function openLightbox(index){
  currentIndex = index;
  const item = flatImages[index];
  lbImg.src = `data:image/jpeg;base64,${item.b64}`;
  lbCaption.textContent = `${item.label} — ${index+1}/${flatImages.length}`;
  lightbox.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(){
  lightbox.classList.remove('open');
  document.body.style.overflow = '';
}
document.addEventListener('click', (e) => {
  const img = e.target.closest('.card img');
  if(img){
    openLightbox(parseInt(img.dataset.flatIndex, 10));
  }
});
document.getElementById('lbClose').addEventListener('click', closeLightbox);
lightbox.addEventListener('click', (e) => { if(e.target === lightbox) closeLightbox(); });
document.getElementById('lbPrev').addEventListener('click', () => openLightbox((currentIndex - 1 + flatImages.length) % flatImages.length));
document.getElementById('lbNext').addEventListener('click', () => openLightbox((currentIndex + 1) % flatImages.length));

// swipe
let touchStartX = null;
lightbox.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
lightbox.addEventListener('touchend', e => {
  if(touchStartX === null) return;
  const dx = e.changedTouches[0].clientX - touchStartX;
  if(Math.abs(dx) > 60){
    if(dx > 0) openLightbox((currentIndex - 1 + flatImages.length) % flatImages.length);
    else openLightbox((currentIndex + 1) % flatImages.length);
  }
  touchStartX = null;
});

// active chip on scroll
const sections = DATA.map(g => document.getElementById(g.id));
const chips = [...chipNav.querySelectorAll('a')];
const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      chips.forEach(c => c.classList.remove('active'));
      const chip = chipNav.querySelector(`a[data-id="${entry.target.id}"]`);
      if(chip){
        chip.classList.add('active');
        chip.scrollIntoView({behavior:'smooth', inline:'center', block:'nearest'});
      }
    }
  });
}, { rootMargin: '-40% 0px -50% 0px' });
sections.forEach(s => observer.observe(s));
</script>
